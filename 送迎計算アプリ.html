<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>送迎計算アプリ | 放課後等デイサービス</title>
<style>
:root{--pr:#1a5276;--prl:#2980b9;--sec:#e8f4fc;--acc:#e74c3c;--ok:#27ae60;--warn:#f39c12;--tx:#2c3e50;--bd:#d5d8dc;--bg:#f4f6f9}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Meiryo UI','Meiryo','Yu Gothic UI',sans-serif;background:var(--bg);color:var(--tx);font-size:14px}
header{background:var(--pr);color:#fff;padding:12px 20px;display:flex;align-items:center;gap:12px}
header h1{font-size:18px}
header .sub{font-size:11px;opacity:.8}
nav{background:#fff;border-bottom:2px solid var(--bd);display:flex;overflow-x:auto}
.nb{padding:12px 18px;border:none;background:none;cursor:pointer;font-size:14px;font-family:inherit;color:#666;border-bottom:3px solid transparent;white-space:nowrap}
.nb.active{color:var(--pr);border-bottom-color:var(--pr);font-weight:bold}
.nb:hover{background:var(--sec)}
main{max-width:1100px;margin:0 auto;padding:20px}
.card{background:#fff;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,.08);padding:20px;margin-bottom:16px}
.ct{font-size:15px;font-weight:bold;color:var(--pr);margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid var(--sec);display:flex;align-items:center;gap:6px}
.fr{display:grid;gap:12px;margin-bottom:12px}
.c2{grid-template-columns:1fr 1fr}
.c3{grid-template-columns:1fr 1fr 1fr}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:12px;color:#666}
.fg input,.fg select{padding:8px 10px;border:1px solid var(--bd);border-radius:4px;font-size:14px;font-family:inherit}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--prl);box-shadow:0 0 0 2px rgba(41,128,185,.15)}
.hint{font-size:11px;color:#999;margin-top:2px}
.btn{display:inline-flex;align-items:center;gap:4px;padding:8px 14px;border:none;border-radius:4px;cursor:pointer;font-size:14px;font-family:inherit;font-weight:500;transition:opacity .15s}
.btn:hover{opacity:.85}
.bp{background:var(--pr);color:#fff}
.bs{background:#e0e0e0;color:#333}
.bd2{background:var(--acc);color:#fff}
.bok{background:var(--ok);color:#fff}
.bw{background:var(--warn);color:#fff}
.sm{padding:5px 10px;font-size:12px}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{background:var(--pr);color:#fff;padding:8px 6px;text-align:center;font-weight:500}
.tbl td{padding:7px 6px;border:1px solid #e8e8e8;text-align:center}
.tbl tbody tr:hover td{background:var(--sec)}
.tbl .tr td{background:#fff3cd;font-weight:bold;border-top:2px solid var(--warn)}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}
.bp2{background:#e3f2fd;color:#1565c0}
.bd3{background:#fce4ec;color:#880e4f}
.bg2{background:#e8f5e9;color:#2e7d32}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
.ov.open{display:flex}
.modal{background:#fff;border-radius:8px;padding:24px;width:90%;max-width:580px;max-height:90vh;overflow-y:auto;box-shadow:0 10px 40px rgba(0,0,0,.2)}
.mt{font-size:16px;font-weight:bold;color:var(--pr);margin-bottom:16px}
.mf{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}
.rb{border:1px solid var(--bd);border-radius:6px;padding:12px;margin:10px 0}
.rs{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.rs select{flex:1;padding:7px;border:1px solid var(--bd);border-radius:4px;font-size:13px;font-family:inherit}
.ib{border-radius:6px;padding:12px 14px;margin:8px 0}
.ic{background:#e8f5e9;border-left:4px solid var(--ok)}
.iw{background:#fff3e0;border-left:4px solid var(--warn)}
.ii{background:var(--sec);border-left:4px solid var(--prl)}
.cr{display:flex;justify-content:space-between;padding:3px 0}
.cr.tot{font-weight:bold;font-size:15px;border-top:1px solid var(--bd);margin-top:4px;padding-top:8px}
.mx th,.mx td{border:1px solid var(--bd);padding:5px 7px;font-size:12px}
.mx th{background:var(--pr);color:#fff;min-width:75px;text-align:center}
.mx td{min-width:75px;text-align:center}
.mx .dg{background:#f0f0f0}
.mx input{width:68px;padding:4px;border:1px solid var(--bd);border-radius:3px;text-align:center;font-size:12px}
.dn-wrap{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.dn-wrap input[type=date]{padding:8px 12px;border:1px solid var(--bd);border-radius:4px;font-size:15px;font-family:inherit;font-weight:bold}
.tc{border:1px solid var(--bd);border-radius:6px;padding:12px;margin-bottom:10px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.tc .rt{flex:1;font-size:13px;min-width:160px}
.tc .am{text-align:right;font-size:13px}
.dn{color:var(--acc);font-size:12px}
.hidden{display:none!important}
@media(max-width:600px){.c2,.c3{grid-template-columns:1fr}main{padding:12px}}
</style>
</head>
<body>

<header>
  <div style="font-size:24px">🚌</div>
  <div>
    <h1>送迎計算アプリ</h1>
    <div class="sub">放課後等デイサービス 私有車使用実績報告書</div>
  </div>
</header>

<nav>
  <button class="nb active" onclick="showTab('daily')">📅 日次入力</button>
  <button class="nb" onclick="showTab('locations')">📍 場所マスタ</button>

  <button class="nb" onclick="showTab('report')">📊 月次レポート</button>
</nav>

<main>
  <div id="panel-daily"></div>
  <div id="panel-locations" class="hidden"></div>
  <div id="panel-settings" class="hidden"></div>
  <div id="panel-report" class="hidden"></div>
</main>

<!-- Trip modal -->
<div class="ov" id="trip-modal">
  <div class="modal">
    <div class="mt" id="trip-modal-title">送迎記録を追加</div>
    <div id="trip-modal-body"></div>
    <div class="mf">
      <button class="btn bs" onclick="closeModal('trip-modal')">キャンセル</button>
      <button class="btn bp" onclick="saveTrip()">保存</button>
    </div>
  </div>
</div>

<!-- Edit location modal -->
<div class="ov" id="edit-loc-modal">
  <div class="modal">
    <div class="mt">場所を編集</div>
    <input type="hidden" id="edit-loc-id">
    <div class="fr"><div class="fg"><label>名前</label><input id="edit-loc-name"></div></div>
    <div class="fr"><div class="fg"><label>住所（距離の自動計算に使用）</label><input id="edit-loc-address" placeholder="例: 茨城県筑西市○○1-2-3"></div></div>
    <div class="mf">
      <button class="btn bs" onclick="closeModal('edit-loc-modal')">キャンセル</button>
      <button class="btn bp" onclick="saveEditLoc()">保存</button>
    </div>
  </div>
</div>

<!-- Location modal -->
<div class="ov" id="loc-modal">
  <div class="modal">
    <div class="mt">場所を追加</div>
    <div class="fr"><div class="fg"><label>場所の名前 *</label><input id="loc-name" placeholder="例: A小学校、田中さん宅"></div></div>
    <div class="fr c2">
      <div class="fg"><label>種別</label><select id="loc-type"><option value="school">学校</option><option value="child_home">児童宅</option><option value="other">その他</option></select></div>
    </div>
    <div class="fr"><div class="fg"><label>住所（距離の自動計算に使用、任意）</label><input id="loc-address" placeholder="例: 茨城県結城市○○1-2-3"></div></div>
    <div class="mf">
      <button class="btn bs" onclick="closeModal('loc-modal')">キャンセル</button>
      <button class="btn bp" onclick="saveLocation()">追加</button>
    </div>
  </div>
</div>

function defaultState() {
  return {
    settings: { facilityName:'', staffName:'', fuelPrice:160, fuelEfficiency:23, commuteDistance:0, fixedRate:10, useFixedRate:false, commuteRate:10 },
    locations: [
      { id:'facility', name:'事業所', type:'facility', address:'' },
      { id:'home',     name:'自宅',   type:'home',     address:'' }
    ],
    distances: {},
    records: {}
  };
}

let state = defaultState();
let currentDate = todayStr();
let eTripEdit = null;
let eTripRoute = ['facility','facility'];
let eTripType = 'pickup';
let eTripManual = null;

function todayStr() { return new Date().toISOString().slice(0,10); }

function loadState() {
  try { const s=localStorage.getItem(DB_KEY); if(s) state={...defaultState(),...JSON.parse(s)}; } catch(e){}
}
function saveState() { localStorage.setItem(DB_KEY,JSON.stringify(state)); }

// ── Calculations ──────────────────────────────────────────
function ratePerKm() {
  const s=state.settings;
  if(s.useFixedRate) return s.fixedRate||0;
  return s.fuelEfficiency>0 ? Math.ceil(s.fuelPrice/s.fuelEfficiency) : 0;
}
function commuteDed() { return state.settings.commuteDistance * (state.settings.commuteRate||0); }

function getDist(a,b) {
  if(a===b) return 0;
  const k1=a+'|'+b, k2=b+'|'+a;
  if(state.distances[k1]!=null) return state.distances[k1];
  if(state.distances[k2]!=null) return state.distances[k2];
  return null;
}

function calcRoute(route) {
  let total=0, missing=[];
  for(let i=0;i<route.length-1;i++){
    const d=getDist(route[i],route[i+1]);
    if(d!==null) total+=d; else missing.push([route[i],route[i+1]]);
  }
  return {total,missing};
}

function calcTrip(trip) {
  const route=trip.route.filter(Boolean);
  const rate=ratePerKm();
  let distance, missing=[];
  if(trip.manualDistance!=null) { distance=trip.manualDistance; }
  else { const r=calcRoute(route); distance=r.total; missing=r.missing; }
  const sendAmt=Math.round(distance*rate);
  const startsHome=route[0]==='home';
  const endsHome=route[route.length-1]==='home';
  const hasDeduction=startsHome||endsHome;
  const ded=hasDeduction?commuteDed():0;
  const paidAmt=Math.max(0,sendAmt-ded);
  return {distance,sendAmt,ded,paidAmt,missing,startsHome,endsHome,hasDeduction};
}

function locName(id) { const l=state.locations.find(x=>x.id===id); return l?l.name:id; }
function N(n) { return Number(n).toLocaleString('ja-JP'); }
function D(km) { return km.toFixed(1)+'km'; }
function typeName(t) { return {pickup:'迎え',dropoff:'送り',outing:'外出'}[t]||t; }
function typeBadge(t) {
  const cls={pickup:'bp2',dropoff:'bd3',outing:'bg2'}[t]||'';
  return `<span class="badge ${cls}">${typeName(t)}</span>`;
}

// ── Navigation ────────────────────────────────────────────
function showTab(name) {
  ['daily','locations','settings','report'].forEach(t=>{
    document.getElementById('panel-'+t).classList.toggle('hidden',t!==name);
  });
  document.querySelectorAll('.nb').forEach((b,i)=>{
    b.classList.toggle('active',['daily','locations','settings','report'][i]===name);
  });
  if(name==='daily') renderDaily();
  if(name==='locations') renderLocations();
  if(name==='settings') renderSettings();
  if(name==='report') renderReport();
}
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) {
  const modal=document.getElementById(id);
  if(modal) modal.classList.remove('open');
}

// ── Daily ─────────────────────────────────────────────────
function renderDaily() {
  try { _renderDaily(); }
  catch(e) {
    const el=document.getElementById('panel-daily');
    if(el) el.innerHTML=`<div class="card" style="border-left:4px solid red;padding:20px"><b>表示エラー:</b> ${e.message}<br><small style="color:#999">${e.stack||''}</small></div>`;
    console.error('renderDaily error:',e);
  }
}
function _renderDaily() {
  const trips=state.records[currentDate]||[];
  let totD=0,totS=0,totP=0;

  const cards=trips.map((trip,idx)=>{
    const {distance,sendAmt,ded,paidAmt,missing,startsHome,endsHome}=calcTrip(trip);
    totD+=distance; totS+=sendAmt; totP+=paidAmt;
    const route=trip.route.filter(Boolean);
    const rt=route.map(locName).join(' → ');
    const missTxt=missing.map(([a,b])=>locName(a)+'↔'+locName(b)).join(', ');
    return `<div class="tc">
      <div>${typeBadge(trip.type)}</div>
      <div class="rt">
        <div style="font-weight:500">${rt}</div>
        ${missing.length?`<div style="color:var(--warn);font-size:11px">⚠ 距離未設定: ${missTxt}</div>`:''}
        ${ded>0?`<div class="dn">${startsHome?'自宅出発':''}${startsHome&&endsHome?' / ':''}${endsHome?'直帰':''}→ 通勤費 -¥${N(ded)} 控除</div>`:''}
      </div>
      <div class="am">
        <div>${D(distance)}</div>
        <div style="color:#888">送迎: ¥${N(sendAmt)}</div>
        <div style="font-weight:bold;color:var(--ok)">支給: ¥${N(paidAmt)}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:4px">
        <button class="btn bs sm" onclick="editTrip('${currentDate}',${idx})">編集</button>
        <button class="btn bd2 sm" onclick="delTrip('${currentDate}',${idx})">削除</button>
      </div>
    </div>`;
  }).join('');

  document.getElementById('panel-daily').innerHTML=`
    <div class="card">
      <div class="dn-wrap">
        <button class="btn bs sm" onclick="chgDate(-1)">◀</button>
        <input type="date" value="${currentDate}" onchange="setDate(this.value)">
        <button class="btn bs sm" onclick="chgDate(1)">▶</button>
        <button class="btn bs sm" onclick="setDate(todayStr())">今日</button>
      </div>
      ${trips.length===0?'<div style="text-align:center;padding:30px;color:#aaa">この日の記録はありません</div>':cards}
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px">
        <button class="btn bp" onclick="addTrip('pickup')">＋ 迎えを追加</button>
        <button class="btn bp" onclick="addTrip('dropoff')">＋ 送りを追加</button>
        <button class="btn bp" onclick="addTrip('outing')">＋ 外出を追加</button>
      </div>
    </div>
    ${trips.length>0?`<div class="card">
      <div class="ct">📊 本日の合計</div>

async function geocodeGSI(address) {
  // 国土地理院ジオコーディングAPI（日本政府、無料、CORS対応）
  const r=await fetch(`https://msearch.gsi.go.jp/address-search/AddressSearch?q=${encodeURIComponent(address)}`);
  const d=await r.json();
  if(d&&d.length>0){
    const [lon,lat]=d[0].geometry.coordinates;
    return {lat,lon};
  }
  return null;
}

async function autoCalcDist() {
  const withAddr=state.locations.filter(l=>l.address);
  if(withAddr.length<2){ alert('住所が登録されている場所が2か所以上必要です。\n各場所に住所を登録してください。'); return; }
  const btn=event.currentTarget;
  btn.disabled=true;

  const coords={};
  let geocoded=0, failed=[];

  // ジオコーディング（住所→座標）
  for(const loc of withAddr){
    btn.textContent=`ジオコーディング中... ${geocoded+1}/${withAddr.length}件`;
    try {
      const c=await geocodeGSI(loc.address);
      if(c){ coords[loc.id]=c; geocoded++; }
      else { failed.push(loc.name); }
    } catch(e){ failed.push(loc.name); }
    await new Promise(r=>setTimeout(r,300));
  }

  if(Object.keys(coords).length<2){
    alert(`座標の取得に失敗しました。\n住所を確認してください。\n失敗: ${failed.join(', ')}`);
    btn.textContent='🗺 住所から距離を自動計算'; btn.disabled=false; return;
  }

  // 距離計算（OSRM）
  const ids=Object.keys(coords);
  const pairs=[];
  for(let i=0;i<ids.length;i++) for(let j=i+1;j<ids.length;j++) pairs.push([ids[i],ids[j]]);
  let done=0;

  for(const [a,b] of pairs){
    btn.textContent=`距離計算中... ${++done}/${pairs.length}区間`;
    try {
      const ca=coords[a],cb=coords[b];
      const r=await fetch(`https://router.project-osrm.org/route/v1/driving/${ca.lon},${ca.lat};${cb.lon},${cb.lat}?overview=false`);
      const d=await r.json();
      if(d.routes?.length>0){
        const km=Math.round(d.routes[0].distance/100)/10;
        if(!state.distances[a+'|'+b]) {
          state.distances[a+'|'+b]=km; state.distances[b+'|'+a]=km;
        }
      }
    } catch(e){}
    await new Promise(r=>setTimeout(r,200));
  }

  saveState(); renderLocations();
  const msg=failed.length?`\n\n住所取得できなかった場所:\n${failed.join('\n')}（手動入力してください）`:'';
  alert(`距離の自動計算が完了しました！\n計算済み: ${done}区間${msg}`);
  btn.textContent='🗺 住所から距離を自動計算'; btn.disabled=false;
}

function prvRate() {
  const useFixed=state.settings.useFixedRate;
  let rate;
  if(useFixed){
    rate=parseFloat(document.getElementById('s-fixed-rate')?.value)||0;
    const el=document.getElementById('s-rate'); if(el) el.textContent=rate+' 円/km';
  } else {
    const fp=parseFloat(document.getElementById('s-fp')?.value)||0;
    const fe=parseFloat(document.getElementById('s-fe')?.value)||1;
    rate=fe>0?Math.ceil(fp/fe):0;
    const el=document.getElementById('s-rate-fuel'); if(el) el.textContent=rate+' 円/km';
  }
  const cd=parseFloat(document.getElementById('s-cd')?.value)||0;
  const cr=parseFloat(document.getElementById('s-cr')?.value)||0;
  const el2=document.getElementById('s-ded'); if(el2) el2.textContent='¥'+N(Math.round(cd*cr));
}

  s.facilityName=document.getElementById('s-fac').value.trim();

function exportJSON() {
  const json=JSON.stringify(state, null, 2);
  const blob=new Blob([json],{type:'application/json;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='送迎計算アプリ_バックアップ_'+new Date().toISOString().slice(0,10)+'.json'; a.click();
  URL.revokeObjectURL(url);
}

function importJSON() {
  const inp=document.createElement('input');
  inp.type='file'; inp.accept='.json';
  inp.onchange=e=>{
    const file=e.target.files[0];
    if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try {
        const data=JSON.parse(ev.target.result);
        if(!data.locations||!data.settings) throw new Error('形式が正しくありません');
        if(!confirm('現在のデータをすべてインポートしたデータで上書きします。よろしいですか？')) return;
        state={...defaultState(),...data};
        saveState(); renderSettings();
        alert('インポート完了しました。');
      } catch(e) { alert('インポート失敗: '+e.message); }
    };
    reader.readAsText(file,'utf-8');
  };
  inp.click();
}

// ── Report ────────────────────────────────────────────────
let rMonth=todayStr().slice(0,7);

function renderReport() {
  const yr=parseInt(rMonth.slice(0,4)), mo=parseInt(rMonth.slice(5,7));
  const days=new Date(yr,mo,0).getDate();
  const s=state.settings;
  const WD=['日','月','火','水','木','金','土'];
  let totD={p:0,d:0,o:0},totS={p:0,d:0,o:0},totP={p:0,d:0,o:0};

  const rows=Array.from({length:days},(_,i)=>{
    const di=i+1;
    const ds=`${yr}-${String(mo).padStart(2,'0')}-${String(di).padStart(2,'0')}`;
    const trips=state.records[ds]||[];
    const byT={pickup:[],dropoff:[],outing:[]};
    trips.forEach(t=>(byT[t.type]||[]).push(t));

    const keys=[['pickup','p'],['dropoff','d'],['outing','o']];
    const cells=keys.map(([type,k])=>{
      const tl=byT[type];
      if(!tl.length) return `<td colspan="3" style="background:#fafafa"></td>`;
      let td=0,ts=0,tp=0,routes=[];
      tl.forEach(t=>{ const c=calcTrip(t); td+=c.distance; ts+=c.sendAmt; tp+=c.paidAmt; routes.push(t.route.map(locName).join('→')); });
      totD[k]+=td; totS[k]+=ts; totP[k]+=tp;
      return `<td style="text-align:left;font-size:11px">${routes.join('<br>')}</td><td>${D(td)}</td><td>¥${N(ts)}</td><td>¥${N(tp)}</td>`;
    });

    const dow=new Date(ds).getDay();
    const wknd=dow===0||dow===6;
    return `<tr style="${wknd?'background:#fff8f8':''}${!trips.length?';color:#ccc':''}">
      <td style="white-space:nowrap">${di}(${WD[dow]})</td>${cells.join('')}</tr>`;
  }).join('');

  const gtD=totD.p+totD.d+totD.o, gtS=totS.p+totS.d+totS.o, gtP=totP.p+totP.d+totP.o;

  document.getElementById('panel-report').innerHTML=`
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">
        <div class="ct" style="margin-bottom:0">📊 月次レポート</div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <input type="month" value="${rMonth}" onchange="setRMonth(this.value)" style="padding:8px;border:1px solid var(--bd);border-radius:4px;font-size:14px">
          <button class="btn bok" onclick="exportCSV()">📥 CSV出力（Excel対応）</button>
        </div>
      </div>
      <div style="font-size:12px;color:#888;margin-bottom:10px">${s.facilityName||'（事業所名未設定）'} ／ 担当: ${s.staffName||'（氏名未設定）'} ／ ${yr}年${mo}月</div>
      <div style="overflow-x:auto">
        <table class="tbl" style="font-size:12px">
          <thead>
            <tr>
              <th rowspan="2">日付</th>
              <th colspan="4" style="background:#1a5276">迎え</th>
              <th colspan="4" style="background:#6c3483">送り</th>
              <th colspan="4" style="background:#1e8449">外出</th>
            </tr>
            <tr>
              ${['#2980b9','#2980b9','#2980b9','#2980b9','#8e44ad','#8e44ad','#8e44ad','#8e44ad','#27ae60','#27ae60','#27ae60','#27ae60']
                .map((c,i)=>`<th style="background:${c}">${['ルート','距離','送迎金額','支給金額','ルート','距離','送迎金額','支給金額','ルート','距離','送迎金額','支給金額'][i]}</th>`).join('')}
            </tr>
          </thead>
          <tbody>${rows}</tbody>
          <tfoot>
            <tr class="tr">
              <td><strong>合計</strong></td>
              <td></td><td>${D(totD.p)}</td><td>¥${N(totS.p)}</td><td>¥${N(totP.p)}</td>
              <td></td><td>${D(totD.d)}</td><td>¥${N(totS.d)}</td><td>¥${N(totP.d)}</td>
              <td></td><td>${D(totD.o)}</td><td>¥${N(totS.o)}</td><td>¥${N(totP.o)}</td>
            </tr>
            <tr style="background:#fef9e7;font-weight:bold;font-size:13px">
              <td colspan="2" style="text-align:right">月間合計</td>
              <td colspan="3">走行距離 ${D(gtD)}</td>
              <td colspan="4">送迎金額合計 ¥${N(gtS)}</td>
              <td colspan="4">支給金額合計 ¥${N(gtP)}</td>
            </tr>
          </tfoot>
        </table>
      </div>
      <div class="ib ii" style="margin-top:12px;font-size:12px">
        燃費換算単価: ${ratePerKm()}円/km ／ 通勤費控除: ¥${N(commuteDed())} ／ 通勤距離: ${state.settings.commuteDistance}km
      </div>
    </div>`;
}

function setRMonth(v) { rMonth=v; renderReport(); }

function exportCSV() {
  const yr=parseInt(rMonth.slice(0,4)), mo=parseInt(rMonth.slice(5,7));
  const days=new Date(yr,mo,0).getDate();
  const s=state.settings;
  const WD=['日','月','火','水','木','金','土'];

  const header=[
    '日付','曜日',
    '迎え_ルート','迎え_走行距離(km)','迎え_送迎金額(円)','迎え_支給金額(円)',
    '送り_ルート','送り_走行距離(km)','送り_送迎金額(円)','送り_支給金額(円)',
    '外出_ルート','外出_走行距離(km)','外出_送迎金額(円)','外出_支給金額(円)'
  ];

  let totD={p:0,d:0,o:0},totS={p:0,d:0,o:0},totP={p:0,d:0,o:0};
  const dataRows=[];

  for(let di=1;di<=days;di++){
    const ds=`${yr}-${String(mo).padStart(2,'0')}-${String(di).padStart(2,'0')}`;
    const trips=state.records[ds]||[];
    const byT={pickup:trips.filter(t=>t.type==='pickup'),dropoff:trips.filter(t=>t.type==='dropoff'),outing:trips.filter(t=>t.type==='outing')};
    const dow=new Date(ds).getDay();
    const row=[ds,WD[dow]];
    [['pickup','p'],['dropoff','d'],['outing','o']].forEach(([type,k])=>{
      const tl=byT[type];
      if(!tl.length){ row.push('','','',''); }
      else {
        let td=0,ts=0,tp=0,routes=[];
        tl.forEach(t=>{ const c=calcTrip(t); td+=c.distance; ts+=c.sendAmt; tp+=c.paidAmt; routes.push(t.route.map(locName).join('→')); });
        totD[k]+=td; totS[k]+=ts; totP[k]+=tp;
        row.push(routes.join(' / '),Math.round(td*10)/10,ts,tp);
      }
    });
    dataRows.push(row);
  }

  const gtD=totD.p+totD.d+totD.o, gtS=totS.p+totS.d+totS.o, gtP=totP.p+totP.d+totP.o;
  const esc=v=>`"${String(v).replace(/"/g,'""')}"`;
  const lines=[
    [`私有車使用実績報告書`],
    [`事業所: ${s.facilityName}`],
    [`担当者: ${s.staffName}`],
    [`対象月: ${yr}年${mo}月`],
    [`燃費換算単価: ${ratePerKm()}円/km`, `通勤費控除: ¥${commuteDed()}`],
    [],
    header,
    ...dataRows,
    [],
    ['合計','',`迎え距離:${D(totD.p)}`,totS.p,totP.p,`送り距離:${D(totD.d)}`,totS.d,totP.d,`外出距離:${D(totD.o)}`,totS.o,totP.o],
    ['月間合計走行距離',D(gtD),'月間合計送迎金額',`¥${gtS}`,'月間合計支給金額',`¥${gtP}`]
  ].map(r=>r.map(esc).join(',')).join('\r\n');

  const blob=new Blob(['﻿'+lines],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`送迎実績_${yr}年${mo}月_${s.staffName||''}.csv`; a.click();
  URL.revokeObjectURL(url);
}

// ── Init ──────────────────────────────────────────────────
loadState();
renderDaily();
</script>
